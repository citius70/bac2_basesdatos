# ===============================
#   CONFIGURACIÓN PRINCIPAL
# ===============================
site_name: Bases de Datos
site_author: Alberto Durán Pérez
site_description: Apuntes y recursos de SQL para 2º de Bachillerato
site_url: https://tusitio-ejemplo.github.io/

# ===============================
#   TEMA MATERIAL
# ===============================
theme:
  name: material
  language: es
  palette:
    - scheme: default # 💡 Modo claro
      primary: indigo # Verde azulado elegante
      accent: indigo # Toque moderno de verde lima
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - scheme: slate # 🌙 Modo oscuro
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
  features:
  # - navigation.top
  # - navigation.sections     # Submenús laterales
    - navigation.instant      # Navegación instantánea sin recargar la página
  # - navigation.expand       # Siempre mostrar desplegados
  # - navigation.tabs         # Pestañas para contenido alternativo
    - navigation.tabs.sticky  # Pestañas pegajosas
  # - navigation.tabs.alternate_style  # Estilo alternativo para pestañas 
    - navigation.footer
    - navigation.indexes      # Índices de contenido
    - navigation.tracking 
    - footer.social
    - footer.icons
    - search.suggestions
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tabs.link
    - search.highlight
  # - toc.integrate
  navigation:
    hierarchy: "flat"
  extra:
    navigation:
      position: right
  # font:
  #   text: Noto # Fuente moderna y legible
  #   code: Fira Code # Excelente para fragmentos de código

# ===============================
#   EXTENSIONES MARKDOWN
# ===============================
markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          # format: !!python/name:pymdownx.superfences.fence_div_format
          format: !!python/name:pymdownx.superfences.fence_code_format

# ===============================
#   NAVEGACIÓN
# ===============================
nav:
  - Inicio: index.md
  - 1. Introducción: introduccion.md
  - 2. Definición de bases de datos: bd_def.md
  - 3. Bases de datos relacionales: bd_relacionales.md
  - 4. Base de datos no relacionales: bd_no_relacionales.md
  - 5. Elección del tipo: eleccion_tipo.md
  - 6. Conceptos básicos de bases de datos:
      - 6.1. Conceptos básicos: conceptos_basicos_sql_new.md
      - 6.1.1. Preguntas sobre conceptos básicos: conceptos_basicos_preguntas.md
      - 6.1.2. Ejercicios. Conceptos básicos: conceptos_basicos_sql_ejercicios.md
  - 7. Comandos básicos:
      - 7.1. Introducción a los comandos: comandos_bd.md
      - 7.2. Comandos DDL: ddl_bd.md
      - 7.3. Comandos DML: dml_bd.md
      - 7.4. Comandos DQL: 
        - 7.4. Comandos DQL: dql.md
        - 7.4.1. Opciones y cláusulas de SELECT: dql_opciones.md
  - 8. Funciones de agregación: funciones_agregacion.md
  - 9. Relaciones entre tablas. JOIN : join.md
  - Resumen: resumen.md
  - Ejercicio resuelto: ejercicio_resuelto.md
  - Ejercicio final: ejercicio_final.md
  - Documento en PDF: pdf/documento.pdf
  - Presentaciones: presentaciones/conceptos_basicos.pdf 

# ===============================
#   OPCIONAL: CONFIGURACIÓN EXTRA
# ===============================
extra:
